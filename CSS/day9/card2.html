<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid & Animation Designs</title>

    <link rel="stylesheet" href="../assets/css/cardds2.css">
</head>

<body>

    <h1>CSS Grid & Animation Designs</h1>


    <section>

        <h2>1. Grid Card Design</h2>

        <div class="card-container">

           

            <div class="card">

                <img src="../assets/images/card2/nature.png" alt="Nature">

                <div class="card-content">

                    <h3>Nature</h3>

                   

                    <button class="card-btn">Explore</button>

                </div>

            </div>

           

            <div class="card">

                <img src="../assets/images/card2/mountain.png" alt="Mountain">

                <div class="card-content">

                    <h3>Mountains</h3>

                  

                    <button class="card-btn">Explore</button>

                </div>

            </div>

            

            <div class="card">

                <img src="../assets/images/card2/ocean.png" alt="Ocean">

                <div class="card-content">

                    <h3>Ocean</h3>

                   

                    <button class="card-btn">Explore</button>

                </div>

            </div>

        </div>

    </section>


    <section>

        <h2>2. Profile Card</h2>

        <div class="profile-container">

            <div class="profile-card">

                <img src="../assets/images/card2/me.webp" alt="Profile">

                <h3>Pradeep Kumar</h3>

               

            </div>

        </div>

    </section>


    <section>

        <h2>3. Image Gallery</h2>

        <div class="gallery">

            <div class="gallery-box">
                <img src="../assets/images/card2/10.png" alt="">
            </div>

            <div class="gallery-box">
                <img src="../assets/images/card2/11.png" alt="">
            </div>

            <div class="gallery-box">
                <img src="../assets/images/card2/12.png" alt="">
            </div>

            <div class="gallery-box">
                <img src="../assets/images/card2/13.png" alt="">
            </div>

        </div>

    </section>


    <section>

        <h2>4. Dashboard Cards</h2>

        <div class="dashboard">

            <div class="dash-card">
                <h3>Users</h3>
                <p>1,250 Active Users</p>
                <button>View</button>
            </div>

            <div class="dash-card">
                <h3>Sales</h3>
                <p>₹50,000 Revenue</p>
                <button>View</button>
            </div>

            <div class="dash-card">
                <h3>Projects</h3>
                <p>18 Running Projects</p>
                <button>View</button>
            </div>

        </div>

    </section>

</body>
</html>
