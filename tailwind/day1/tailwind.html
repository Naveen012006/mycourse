<!-- Task 1 : Card -->
<h1 class="text-3xl font-bold text-center mt-5">Task 1 - Card</h1>

</div>

<nav class="flex justify-between items-center bg-blue-500 p-4 text-white">

    <div class="flex gap-5">
        <a href="#">Home</a>
        <a href="#">About</a>
