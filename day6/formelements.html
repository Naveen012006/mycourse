<html>
    <head>
        <title>form element</title>
    </head>

<body>
    <section>
        <div>
            <center>
<form method="post">
<h1>SLA INSTITUTE COURSE ENQUERY</h1>
<label>Name</label>
<input type="text" required placeholder="Enter your name">
<br>
<br>
<label>Age</label>
<input type="number"required min="18" max="45" placeholder="above 18 only">
<br>
<br>
<label>DOB</label>
<input type="date" required >
<br>
<br>
<label>Degree</label>
<input type="text" required placeholder="Enter your Degree">
<br>
<br>
<label>Gender</label>
<input type="radio"  name="gender">Male
<input type="radio" name="gender">Female
<br>
<br>
<label>Moblie no</label>
<input type="tel" minlength="10" maxlength="10" required placeholder="10 digit only">
<br>
<br>
<label>Email ID</label>
<input type="email" required placeholder="eg.,naveen@gmail.com">
<br>
<br>
<label>City</label>
<input type="text" required placeholder="Enter your city">
<br>
<br>
<label>Which course would you like to learn more about from us?</label>
<br>
<input type="checkbox" name="course">Fullstack web devolopment
<input type="checkbox" name="course">python programming
<input type="checkbox" name="course">data Science
<input type="checkbox" name="course">cyper security
<input type="checkbox" name="course">cloud computing
<br>
<br>
<label>What time are you free for a call?</label>
<input type="time" required>
<br>
<br>
<label>why are you choosing this Institute?</label>
<br>
<textarea required></textarea>
<br>
<br>
<input type="submit" value="submit">

        


            </form>


            </center>
        </div>
    </section>
</body>
</html>
