<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <div class="col-3 bg-dark text-white p-3">
            <h4>Menu</h4>
            <p>Dashboard</p>
            <p>Users</p>
            <p>Courses</p>
            <p>Reports</p>
            <p>Settings</p>
        </div>

        <div class="col-9 p-3">
            <h2>Dashboard</h2>

            <div class="row">

                <div class="col-md-3">
                    <div class="card p-3">
                        <h4>100</h4>
                        <p>Users</p>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3">
                        <h4>20</h4>
                        <p>Courses</p>
                    </div>
                </div>

            </div>

            <h3 class="mt-4">Recent Users</h3>

            <table class="table table-bordered">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                </tr>
                <tr>
                    <td>1</td>
                    <td>Naveen</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Arun</td>
                </tr>
            </table>

        </div>

    </div>
</div>

</body>
</html>
