<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day8 task</title>
</head>
<body>
    <script>
// ==========================
// Task 1 – push() Method
// ==========================
let courses1 = ["HTML", "CSS", "JavaScript"];

courses1.push("React");
courses1.push("Node.js");

console.log("Task 1:");
console.log(courses1);


// ==========================
// Task 2 – pop() Method
// ==========================
let courses2 = ["HTML", "CSS", "JavaScript", "React"];

let removedCourse = courses2.pop();

console.log("\nTask 2:");
console.log("Removed Element:", removedCourse);
console.log("Updated Array:", courses2);


// ==========================
// Task 3 – shift() Method
// ==========================
let fruits = ["Apple", "Mango", "Orange", "Banana"];

let removedFruit = fruits.shift();

console.log("\nTask 3:");
console.log("Removed Fruit:", removedFruit);
console.log("Updated Array:", fruits);


// ==========================
// Task 4 – unshift() Method
// ==========================
let actors = ["Ajith", "Suriya", "SK"];

actors.unshift("Vijay");
actors.unshift("Dhanush");

console.log("\nTask 4:");
console.log(actors);


// ==========================
// Task 5 – splice() Method
// ==========================
let skills = ["HTML", "CSS", "Bootstrap", "React"];

skills.splice(2, 1, "JavaScript");

console.log("\nTask 5:");
console.log(skills);


// ==========================
// Task 6 – slice() Method
// ==========================
let courses3 = ["HTML", "CSS", "JavaScript", "React", "Node"];

let newCourses = courses3.slice(2, 4);

console.log("\nTask 6:");
console.log(newCourses);


// ==========================
// Task 7 – Object Looping
// ==========================
let student = {
    name: "Sudhan",
    course: "MERN",
    city: "Chennai",
    age: 25
};

console.log("\nTask 7:");

for (let key in student) {
    console.log(key + " : " + student[key]);
}


// ==========================
// Task 8 – Array of Objects
// ==========================
let movies = [
    {
        name: "Vijay",
        movie: "GOAT"
    },
    {
        name: "Ajith",
        movie: "Vidaamuyarchi"
    },
    {
        name: "Suriya",
        movie: "Kanguva"
    }
];

console.log("\nTask 8:");

for (let i = 0; i < movies.length; i++) {
    console.log(movies[i].name + " - " + movies[i].movie);
}


// ==========================
// Task 9 – join() Method
// ==========================
let heroes = ["Vijay", "Ajith", "Suriya", "SK"];

let result = heroes.join(" | ");

console.log("\nTask 9:");
console.log(result);


// ==========================
// Task 10 – includes() Method
// ==========================
let courses4 = ["HTML", "CSS", "JavaScript", "React"];

console.log("\nTask 10:");

if (courses4.includes("React")) {
    console.log("Course Found");
} else {
    console.log("Course Not Found");
}


// ==========================
// Bonus 1 – concat()
// ==========================
let arr1 = ["HTML", "CSS"];
let arr2 = ["JavaScript", "React"];

let merged = arr1.concat(arr2);

console.log("\nBonus - concat()");
console.log(merged);


// ==========================
// Bonus 2 – indexOf()
// ==========================
let languages = ["HTML", "CSS", "JavaScript", "React"];

console.log("\nBonus - indexOf()");
console.log(languages.indexOf("JavaScript"));


// ==========================
// Bonus 3 – lastIndexOf()
// ==========================
let numbers = [10, 20, 30, 20, 40];

console.log("\nBonus - lastIndexOf()");
console.log(numbers.lastIndexOf(20));


// ==========================
// Bonus 4 – reverse()
// ==========================
let colors = ["Red", "Green", "Blue"];

colors.reverse();

console.log("\nBonus - reverse()");
console.log(colors);


// ==========================
// Bonus 5 – sort()
// ==========================
let names = ["Suriya", "Ajith", "Vijay", "Dhanush"];

names.sort();

console.log("\nBonus - sort()");
console.log(names);


// ==========================
// Bonus 6 – toString()
// ==========================
let tech = ["HTML", "CSS", "JavaScript"];

console.log("\nBonus - toString()");
console.log(tech.toString());


// ==========================
// Bonus 7 – length
// ==========================
let subjects = ["HTML", "CSS", "JavaScript", "React"];

console.log("\nBonus - length");
console.log(subjects.length);

    </script>
    
</body>
</html>
